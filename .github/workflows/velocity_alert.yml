name: Pitcher Velocity Alert

on:
  schedule:
    # Runs at 11:00 PM ET (03:00 UTC) Mon–Fri
    # Late enough that same-day game data is in Statcast
    - cron: "0 3 * * 2-6"

  # Lets you trigger a manual run from the GitHub Actions tab
  workflow_dispatch:

jobs:
  run-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run alert system
        env:
          TWITTER_API_KEY:        ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:     ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:   ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET:  ${{ secrets.TWITTER_ACCESS_SECRET }}
          TWILIO_ACCOUNT_SID:     ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:      ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER:     ${{ secrets.TWILIO_FROM_NUMBER }}
          TWILIO_TO_NUMBER:       ${{ secrets.TWILIO_TO_NUMBER }}
        run: python alert_system.py
